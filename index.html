<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="OpenRank helps developers track contributions, discover projects, and build an open source portfolio."
    />
    <title>OpenRank - Open Source Contribution Tracker</title>
    <script>
      (function () {
        const redirectKey = "openrank-spa-redirect";
        const redirectedPath = window.sessionStorage.getItem(redirectKey);

        if (!redirectedPath) {
          return;
        }

        window.sessionStorage.removeItem(redirectKey);
        window.history.replaceState(null, "", redirectedPath);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
